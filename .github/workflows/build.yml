name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Plugin
        run: |
          ./gradlew assembleDebug --no-daemon --no-build-cache
          if ls plugin/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            for apk in plugin/build/outputs/apk/debug/*.apk; do
              mv "$apk" "${apk}.lnrp"
            done
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-apk
          path: plugin/build/outputs/apk/debug/*.apk.lnrp
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-apk
          path: ./artifacts

      - name: Get Version Info
        id: version
        run: |
          VERSION="${INPUT_VERSION:-1.0.0}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: artifacts/*.apk.lnrp
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: WebDAV Sync Plugin v${{ steps.version.outputs.VERSION }}
          body: |
            ## WebDAV Sync Plugin for LightNovelReader

            ### Features
            - WebDAV cloud sync support
            - Sync reading history, bookshelf, and app settings
            - Auto and manual sync modes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
