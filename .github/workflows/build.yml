name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

env:
  GRADLE_VERSION: 9.2.1
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Build Plugin
        run: gradle assembleDebug --no-daemon

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-apk
          path: plugin/build/outputs/apk/debug/*.apk.lnrp
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-apk
          path: ./artifacts

      - name: Get Version Info
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: artifacts/*.apk.lnrp
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: WebDAV Sync Plugin v${{ steps.version.outputs.VERSION }}
          body: |
            ## WebDAV Sync Plugin for LightNovelReader

            ### Features
            - WebDAV cloud sync support (Nextcloud, ownCloud, Synology, etc.)
            - Sync reading history, bookshelf, and app settings
            - Auto and manual sync modes
            - Incremental sync with conflict resolution

            ### Installation
            1. Download the .apk.lnrp file
            2. Install with file manager in LightNovelReader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
