name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GRADLE_VERSION: 9.2.1
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-disabled: true
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Build with Gradle
        run: cd plugin && gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-apk
          path: plugin/build/outputs/apk/debug/*.apk.lnrp
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-apk
          path: ./artifacts

      - name: Get Version Info
        id: version
        run: |
          VERSION="1.0.0"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: artifacts/*.apk.lnrp
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: WebDAV Sync Plugin v${{ steps.version.outputs.VERSION }}
          body: |
            ## WebDAV Sync Plugin for LightNovelReader
            
            ### Features
            - WebDAV 云同步支持
            - 自动和手动同步模式
            - 同步阅读记录、书架和软件设置
            
            ### Installation
            1. 下载 .apk.lnrp 文件
            2. 使用文件管理器安装到 LightNovelReader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
